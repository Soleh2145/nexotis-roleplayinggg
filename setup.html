<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Awal - Kepolisian Nexotis</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="flag">🛠️</div>
      <h1>SETUP AWAL</h1>
      <p>Halaman ini cuma bisa dipakai SEKALI, selama belum ada akun sama sekali di sistem. Dipakai untuk membuat akun High Command pertama.</p>

      <div class="form-group" style="text-align:left">
        <label for="secret">Setup Secret</label>
        <input type="password" id="secret" placeholder="isi SETUP_SECRET dari Environment Variables">
      </div>
      <div class="form-group" style="text-align:left">
        <label for="username">Username Admin</label>
        <input type="text" id="username" placeholder="mis. kapolda">
      </div>
      <div class="form-group" style="text-align:left">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="minimal 6 karakter">
      </div>
      <div class="form-group" style="text-align:left">
        <label for="pangkat">Pangkat</label>
        <input type="text" id="pangkat" placeholder="Kapolda" value="Kapolda">
      </div>
      <button class="btn btn-primary" style="width:100%" id="setup-btn">Buat Akun Admin</button>
      <div class="error-msg" id="msg"></div>
      <div class="foot">Setelah berhasil, halaman ini otomatis nggak akan bisa dipakai lagi.</div>
    </div>
  </div>

<script src="app.js"></script>
<script>
  document.getElementById("setup-btn").addEventListener("click", async () => {
    const msgEl = document.getElementById("msg");
    msgEl.style.color = "";
    msgEl.textContent = "";
    const secret = document.getElementById("secret").value;
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const pangkat = document.getElementById("pangkat").value.trim();

    const btn = document.getElementById("setup-btn");
    btn.disabled = true; btn.textContent = "Membuat...";
    try {
      await api("/api/setup", { method: "POST", body: JSON.stringify({ secret, username, password, pangkat }) });
      msgEl.style.color = "#4ade80";
      msgEl.textContent = "Berhasil! Mengarahkan ke halaman login...";
      setTimeout(() => { window.location.href = "index.html"; }, 1500);
    } catch (e) {
      msgEl.textContent = e.message;
    } finally {
      btn.disabled = false; btn.textContent = "Buat Akun Admin";
    }
  });
</script>
</body>
</html>
